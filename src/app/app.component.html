<label for="task">Add Task</label>
<input [value]="newTask()" (input)="onInput($event)" id="task" type="text" />
<button (click)="addTaks()">Add</button>

@for (task of tasks(); track task.id) {
  <div>
    <p>{{ task.title }}</p>
    <button (click)="taskStatusChange(task.id)">
      {{ task.status ? "Done" : "Not Done" }}
    </button>
    <button (click)="removeTask(task.id)">Remove</button>
  </div>
}
